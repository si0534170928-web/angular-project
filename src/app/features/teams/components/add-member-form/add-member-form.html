<form [formGroup]="memberForm" (ngSubmit)="onSubmit()" class="member-form">
  <div class="form-header">
    <h3 class="form-title">Add Team Member</h3>
    <p class="form-subtitle">Invite a registered user to join your team</p>
  </div>

  <div class="form-group">
    <div class="input-wrapper">
      @if (loadingUsers()) {
        <div class="loading-users">Loading users...</div>
      } @else {
        <select
          id="memberUser"
          class="form-select"
          formControlName="userId"
        >
          <option value="">Select a user to add...</option>
          @for (user of users(); track user.id) {
            <option [value]="user.id">{{ user.name }} ({{ user.email }})</option>
          }
        </select>
      }
      <div class="input-underline"></div>
    </div>

    @if (memberForm.get('userId')?.invalid && memberForm.get('userId')?.touched && !isLoading()) {
      <div class="error-message">
        <svg class="error-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="2"/>
          <path d="M8 5V9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <circle cx="8" cy="12" r="0.5" fill="currentColor"/>
        </svg>
        {{ getErrorMessage() }}
      </div>
    }
  </div>

  <div class="form-actions">
    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="!memberForm.valid"
    >
      @if (isLoading()) {
        <span class="spinner"></span>
        <span class="btn-text">Adding...</span>
      } @else {
        <span class="btn-text">Add Member</span>
        <span class="btn-icon">+</span>
      }
    </button>
  </div>
</form>
