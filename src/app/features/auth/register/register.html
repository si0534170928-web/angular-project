<div class="auth-page">
  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-logo">
        <div class="logo-icon"><mat-icon>person_add</mat-icon></div>
        <h1>Join Us Today</h1>
      </div>
      <p class="auth-subtitle">Create your account to get started</p>
    </div>
    
    <div class="form-container">
      @if (errorMessage()) {
        <div class="error-alert">
          {{ errorMessage() }}
        </div>
      }
      
      <app-auth-form [mode]="'register'" 
        [isLoading]="isLoading()"
        (registerFormSubmitted)="onSubmit($event)">
      </app-auth-form>
    </div>
    
    <div class="auth-footer">
      <p>Already have an account? 
        <a routerLink="/auth/login" class="auth-link">Sign in here</a>
      </p>
    </div>
  </div>
</div>
