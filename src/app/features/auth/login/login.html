<div class="auth-page">
  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-logo">
        <div class="logo-icon"><mat-icon>login</mat-icon></div>
        <h1>Welcome Back</h1>
      </div>
      <p class="auth-subtitle">Sign in to your account to continue</p>
    </div>
    
    <div class="form-container">
      @if (errorMessage()) {
        <div class="error-alert">
          {{ errorMessage() }}
        </div>
      }
      
      <app-auth-form [mode]="'login'" 
        [isLoading]="isLoading()"
        (loginFormSubmitted)="onSubmit($event)">
      </app-auth-form>
    </div>
    
    <div class="auth-footer">
      <p>Don't have an account? 
        <a routerLink="/auth/register" class="auth-link">Sign up for free</a>
      </p>
    </div>
  </div>
</div>
